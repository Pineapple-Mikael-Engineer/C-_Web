# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
# ----------------------------------------------------------------------------
# Configuración de Quartz para el vault de C++ (notas Obsidian).
# El tema replica los snippets de Obsidian:
#   - modo claro  -> clion-light  (CLion / IntelliJ Light)
#   - modo oscuro -> cpp-console  (terminal azul-noche, Blue Topaz night)
# El contenido (content/) es un submódulo git del repo de las notas.
# ----------------------------------------------------------------------------
configuration:
  pageTitle: C++ · Notas
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics:
    provider: null
  locale: es-ES
  # Cambia esto por tu dominio cuando publiques (p.ej. usuario.github.io/repo).
  baseUrl: localhost:8080
  ignorePatterns:
    - private
    - _private
    - templates
    - .obsidian
    - .claude
    - .git
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      # Encabezados monospace, igual que los snippets de Obsidian.
      header: JetBrains Mono
      body: Inter
      code: Fira Code
    colors:
      # ---- modo claro: snippet clion-light (IntelliJ / CLion Light) ----
      lightMode:
        light: "#f7f8fa" # fondo general (--cl-bg)
        lightgray: "#d6dae1" # bordes (--cl-border)
        gray: "#6b7280" # texto atenuado (--cl-text-dim)
        darkgray: "#1c1f24" # texto base (--cl-text)
        dark: "#16456f" # encabezados (azul IDE)
        secondary: "#2470b3" # acento / enlaces (--cl-blue)
        tertiary: "#00627a" # hover / acento 2 (--cl-func)
        highlight: "rgba(36, 112, 179, 0.10)"
        textHighlight: "#fff23688"
      # ---- modo oscuro: snippet cpp-console (terminal azul-noche) ----
      darkMode:
        light: "#0a0f1a" # fondo general (--ct-bg)
        lightgray: "#1b2738" # bordes (--ct-border)
        gray: "#74849c" # texto atenuado (--ct-text-dim)
        darkgray: "#c7d4e6" # texto base (--ct-text)
        dark: "#8fe0f5" # encabezados (--ct-heading)
        secondary: "#56c7e6" # acento / enlaces (--ct-cyan)
        tertiary: "#4fd6be" # hover / acento 2 (--ct-teal)
        highlight: "rgba(86, 199, 230, 0.10)"
        textHighlight: "#b3aa0288"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/tag-list
    enabled: false
    layout:
      position: beforeBody
      priority: 30
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options: {}
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/jackyzha0/quartz
        Discord Community: https://discord.gg/cRFFHYye7t
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: true
    options:
      iterations: 600000
      passwordField: password
      unlistWhenEncrypted: false
      outputPath: static/encryptedContentIndex.json
    order: 900
    layout:
      position: body
      priority: 100
      display: all
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
